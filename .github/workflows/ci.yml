name: CI

on:
  push:
    branches: [main, developer]
  pull_request:
    branches: [main, developer]

jobs:
  build:
    name: Type-check + Next build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
