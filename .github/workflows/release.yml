name: Release

# Triggered by pushing a version tag (e.g. v1.0.0). The job matrix builds
# every desktop target in parallel on a native runner, uploads each
# artifact, and at the end the publish job creates a GitHub Release tied
# to the tag with all artifacts attached.
#
# macOS builds are signed with a Developer ID Application certificate
# AND notarized by Apple when the runtime secrets are present:
#
#   MAC_DEVELOPER_ID_CERT_BASE64        base64 of the .p12 cert+key
#   MAC_DEVELOPER_ID_CERT_PASSWORD      password for the .p12
#   APPLE_API_KEY_BASE64                base64 of the .p8 ASC API key
#   APPLE_API_KEY_ID                    the key's 10-char ID
#   APPLE_API_ISSUER                    the issuer UUID
#
# When all five are set, scripts/build-electron.mjs picks the
# `developer-id` branch automatically and the published DMG opens on a
# fresh macOS download with no Gatekeeper prompt. When the cert secret
# is missing, the matrix falls back to ad-hoc signing (the legacy
# behaviour). Windows builds are not auto-signed.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0). Required for manual runs."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS builds run on macos-latest (Apple Silicon) because
          # Intel runners are being deprecated by GitHub and queue times for
          # macos-13 are unreliable. The Intel slice cross-builds via
          # electron-builder's `--mac --x64` from the arm64 host — there are
          # no native modules in the bundle (standalone Next.js server is
          # pure JS) and the matching Codex binary is fetched from npm
          # per-target by scripts/electron-prepare.mjs, so the resulting
          # x64 .dmg ships exactly what an Intel Mac needs.
          - label: macOS (Apple Silicon)
            os: macos-latest
            target: mac-arm64
            triple: darwin-arm64
            artifact: dist-electron/*.dmg
          - label: macOS (Intel, cross-built on arm64)
            os: macos-latest
            target: mac-x64
            triple: darwin-x64
            artifact: dist-electron/*.dmg
          - label: Windows (x64)
            os: windows-latest
            target: win-x64
            triple: win32-x64
            artifact: dist-electron/*.exe
          # Linux x64 builds a portable AppImage on a native ubuntu runner.
          # No code signing on Linux; electron-builder bundles appimagetool,
          # and the matching musl Codex binary is fetched per-target by
          # scripts/electron-prepare.mjs, same as every other slice.
          - label: Linux (x64)
            os: ubuntu-latest
            target: linux-x64
            triple: linux-x64
            artifact: dist-electron/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Pin app version from tag
        shell: bash
        # Strip the leading "v" off the tag and write it into package.json
        # so electron-builder, the standalone server, Next.js (via
        # NEXT_PUBLIC_APP_VERSION), and the in-app version chip all read
        # the same single value. Manual workflow_dispatch supports an
        # explicit input; tag-pushes derive from GITHUB_REF.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "Pinning to version $VERSION"
          npm version --no-git-tag-version --allow-same-version "$VERSION"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Prepare standalone (sync assets, fetch codex binary for target)
        run: node scripts/electron-prepare.mjs --target=${{ matrix.triple }}

      # ── macOS code signing setup ───────────────────────────────────────
      # Decodes the .p12 secret into a fresh one-shot keychain on the
      # runner so `security find-identity -p codesigning` lists the
      # Developer ID Application cert, then build-electron.mjs's
      # signing detection sees the cert the same way it sees it on a
      # local Mac and flips electron-builder into the developer-id
      # branch. Short-circuits cleanly when the secret is missing —
      # the build then falls back to the ad-hoc path.
      - name: Import Developer ID certificate (macOS jobs only)
        if: startsWith(matrix.target, 'mac-')
        env:
          MAC_DEVELOPER_ID_CERT_BASE64: ${{ secrets.MAC_DEVELOPER_ID_CERT_BASE64 }}
          MAC_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MAC_DEVELOPER_ID_CERT_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$MAC_DEVELOPER_ID_CERT_BASE64" ]; then
            echo "MAC_DEVELOPER_ID_CERT_BASE64 secret is empty — falling back to ad-hoc build."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="$RUNNER_TEMP/devid.p12"
          echo -n "$MAC_DEVELOPER_ID_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$MAC_DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm -f "$CERT_PATH"
          echo "Signing identities available to the runner:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Stage App Store Connect notary key (macOS jobs only)
        if: startsWith(matrix.target, 'mac-')
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        shell: bash
        run: |
          if [ -z "$APPLE_API_KEY_BASE64" ]; then
            echo "APPLE_API_KEY_BASE64 secret is empty — notarization will be skipped."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/apple"
          KEY_PATH="$RUNNER_TEMP/apple/AuthKey.p8"
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build desktop (${{ matrix.target }})
        env:
          # APPLE_API_KEY (path) is exported in the previous step via
          # $GITHUB_ENV when the secret is set. The other two come
          # straight from secrets; build-electron.mjs reads them
          # alongside the keychain to pick the signing mode.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-electron.mjs --target=${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: getit-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) -exec cp {} release/ \;
          ls -lh release

      - name: Check if prerelease
        id: check_prerelease
        run: |
          if [[ "${{ steps.tag.outputs.tag }}" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Get It. ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: release/*
          draft: false
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
